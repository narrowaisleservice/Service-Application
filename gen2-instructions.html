<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen2 Instructions - Narrow Aisle Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('lines.svg');
            background-size: cover;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.8) 0%, rgba(20, 20, 20, 0.6) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(220, 38, 38, 0.15);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
            position: relative;
        }

        .back-btn {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(220, 38, 38, 0.3);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            flex: 1;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .coming-soon-box {
            text-align: center;
            background: linear-gradient(135deg, rgba(35, 35, 35, 0.9) 0%, rgba(20, 20, 20, 0.8) 100%);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 16px;
            padding: 60px 40px;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .coming-soon-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .coming-soon-box h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e0e0e0 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .coming-soon-box p {
            font-size: 16px;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .coming-soon-box .details {
            font-size: 13px;
            color: #707070;
            padding: 20px;
            background: rgba(220, 38, 38, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(220, 38, 38, 0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='portal-hub-professional.html'">← Back to Portal</button>
        <h1>Gen2 Instructions</h1>
    </div>
    <div class="content">
        <div class="coming-soon-box">
            <div class="coming-soon-icon">🚧</div>
            <h2>Coming Soon</h2>
            <p>Gen2 manual is currently being prepared and will be available shortly.</p>
            <div class="details">
                <p>Check back soon or contact your administrator for more information.</p>
            </div>
        </div>
    </div>
</body>
</html>
