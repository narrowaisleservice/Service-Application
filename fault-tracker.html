<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Fault Tracker - Flexi Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #101010;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            border-left: 5px solid #df0a1e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .header h1 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #707070;
            font-size: 14px;
        }

        .controls {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .search-box {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
        }

        .search-box:focus {
            outline: none;
            border-color: #df0a1e;
            box-shadow: 0 0 0 3px rgba(223, 10, 30, 0.1);
        }

        .filter-select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #df0a1e;
        }

        .btn-refresh {
            padding: 12px 24px;
            background: #df0a1e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            background: #c3161e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(223, 10, 30, 0.3);
        }

        .btn-new-fault {
            padding: 12px 24px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-new-fault:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #707070;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #df0a1e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .faults-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .fault-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-left: 5px solid;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .fault-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .fault-card.critical {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.02);
        }

        .fault-card.high {
            border-left-color: #ffa940;
            background: rgba(255, 169, 64, 0.02);
        }

        .fault-card.medium {
            border-left-color: #faad14;
            background: rgba(250, 173, 20, 0.02);
        }

        .fault-card.low {
            border-left-color: #52c41a;
            background: rgba(82, 196, 26, 0.02);
        }

        .fault-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .fault-id {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #101010;
        }

        .priority-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .priority-badge.critical {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .priority-badge.high {
            background: rgba(255, 169, 64, 0.2);
            color: #ffa940;
        }

        .priority-badge.medium {
            background: rgba(250, 173, 20, 0.2);
            color: #faad14;
        }

        .priority-badge.low {
            background: rgba(82, 196, 26, 0.2);
            color: #52c41a;
        }

        .fault-details {
            margin-bottom: 16px;
        }

        .fault-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }

        .fault-detail-label {
            color: #707070;
            font-weight: 500;
        }

        .fault-detail-value {
            color: #101010;
            font-weight: 600;
        }

        .fault-description {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: #101010;
        }

        .fault-footer {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-select {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: white;
        }

        .btn-edit {
            padding: 8px 16px;
            background: #df0a1e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-edit:hover {
            background: #c3161e;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #707070;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 20px;
            margin-bottom: 8px;
            color: #101010;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .stat-number {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #df0a1e;
        }

        .stat-label {
            font-size: 12px;
            color: #707070;
            margin-top: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .faults-grid {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Fault Tracker</h1>
            <p>View and manage all reported truck issues</p>
        </div>

        <div class="stats" id="stats"></div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Search by truck ID, description...">
            <select id="statusFilter" class="filter-select">
                <option value="">All Status</option>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
            </select>
            <button class="btn-refresh" onclick="loadFaults()">🔄 Refresh</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading faults...</p>
        </div>

        <div id="faultsContainer" class="faults-grid"></div>
    </div>

    <script>
        // UPDATE THIS with your GAS deployment URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwIs_sxohYd6gMSTZ2GyDmAUQ1qh75Mkx3p4JxAaty_kdWAPtlcy6aLM1WgowwwPnLmOQ/exec";

        let allFaults = [];

        // Load faults on page load
        window.addEventListener('load', loadFaults);

        async function loadFaults() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('faultsContainer');
            
            loading.style.display = 'block';
            container.innerHTML = '';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getFaults' })
                });

                const result = await response.json();

                if (result.success) {
                    allFaults = result.faults || [];
                    displayFaults(allFaults);
                    updateStats();
                } else {
                    throw new Error(result.error || 'Failed to load faults');
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">⚠️</div>
                        <h2>Error Loading Faults</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 16px; font-size: 12px;">Make sure your GAS_URL is correct</p>
                    </div>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayFaults(faults) {
            const container = document.getElementById('faultsContainer');

            if (faults.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">✅</div>
                        <h2>No Faults</h2>
                        <p>No truck issues reported yet</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = faults.map(fault => `
                <div class="fault-card ${fault.priority.toLowerCase()}">
                    <div class="fault-header">
                        <div class="fault-id">${fault.faultId}</div>
                        <span class="priority-badge ${fault.priority.toLowerCase()}">${fault.priority}</span>
                    </div>

                    <div class="fault-details">
                        <div class="fault-detail-row">
                            <span class="fault-detail-label">Truck ID</span>
                            <span class="fault-detail-value">${fault.truckId || '-'}</span>
                        </div>
                        <div class="fault-detail-row">
                            <span class="fault-detail-label">Reported By</span>
                            <span class="fault-detail-value">${fault.reportedBy || '-'}</span>
                        </div>
                        <div class="fault-detail-row">
                            <span class="fault-detail-label">Date</span>
                            <span class="fault-detail-value">${fault.date || '-'}</span>
                        </div>
                        <div class="fault-detail-row">
                            <span class="fault-detail-label">Status</span>
                            <span class="fault-detail-value">${fault.status || 'Open'}</span>
                        </div>
                    </div>

                    <div class="fault-description">
                        ${fault.description}
                    </div>

                    <div class="fault-footer">
                        <select class="status-select" onchange="updateFaultStatus('${fault.faultId}', this.value)">
                            <option value="Open" ${fault.status === 'Open' ? 'selected' : ''}>Open</option>
                            <option value="In Progress" ${fault.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option value="Resolved" ${fault.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            const total = allFaults.length;
            const open = allFaults.filter(f => f.status === 'Open' || !f.status).length;
            const inProgress = allFaults.filter(f => f.status === 'In Progress').length;
            const resolved = allFaults.filter(f => f.status === 'Resolved').length;

            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Faults</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ff6b6b;">${open}</div>
                    <div class="stat-label">Open</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ffa940;">${inProgress}</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #52c41a;">${resolved}</div>
                    <div class="stat-label">Resolved</div>
                </div>
            `;
        }

        async function updateFaultStatus(faultId, newStatus) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateFault',
                        faultId: faultId,
                        status: newStatus
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Update local copy
                    const fault = allFaults.find(f => f.faultId === faultId);
                    if (fault) fault.status = newStatus;
                    displayFaults(allFaults);
                    updateStats();
                }
            } catch (error) {
                alert('Error updating fault: ' + error.message);
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allFaults.filter(fault => {
                const matchesSearch = !search || 
                    fault.faultId.toLowerCase().includes(search) ||
                    fault.truckId.toLowerCase().includes(search) ||
                    fault.description.toLowerCase().includes(search);
                
                const matchesStatus = !status || fault.status === status;

                return matchesSearch && matchesStatus;
            });

            displayFaults(filtered);
        });

        // Status filter
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = e.target.value;

            const filtered = allFaults.filter(fault => {
                const matchesSearch = !search || 
                    fault.faultId.toLowerCase().includes(search) ||
                    fault.truckId.toLowerCase().includes(search) ||
                    fault.description.toLowerCase().includes(search);
                
                const matchesStatus = !status || fault.status === status;

                return matchesSearch && matchesStatus;
            });

            displayFaults(filtered);
        });
    </script>
</body>
</html>
