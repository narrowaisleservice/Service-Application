<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#df0a1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Service Portal">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23df0a1e' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>NA</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>Narrow Aisle Service Portal - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #101010;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Tetris pattern background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(135deg, transparent 48%, #df0a1e 48%, #df0a1e 52%, transparent 52%),
                repeating-linear-gradient(0deg, #c3161e 0px, #c3161e 40px, #81171a 40px, #81171a 80px),
                repeating-linear-gradient(90deg, #df0a1e 0px, #df0a1e 80px, #c3161e 80px, #c3161e 160px);
            background-size: 200px 200px, 100% 100%, 100% 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 32px;
            background: linear-gradient(135deg, #1a1a1a 0%, #1f1f1f 100%);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .logo-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 32px;
            border-bottom: 2px solid #df0a1e;
        }

        .logo-text {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: #df0a1e;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 13px;
            color: #a0a0a0;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #242424;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            background: #2a2a2a;
            border-color: #df0a1e;
            box-shadow: 0 0 0 3px rgba(223, 10, 30, 0.1);
        }

        button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #df0a1e 0%, #c3161e 100%);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(223, 10, 30, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .demo-note {
            margin-top: 32px;
            padding: 16px;
            background: rgba(223, 10, 30, 0.08);
            border-left: 3px solid #df0a1e;
            border-radius: 4px;
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 24px;
                max-width: 100%;
                margin: 20px;
                border-radius: 8px;
            }

            .logo-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-header">
            <div class="logo-text">NARROW AISLE</div>
            <div class="tagline">Your space, our expertise</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
                <div class="error" id="passwordError"></div>
            </div>

            <button type="submit">Sign In</button>

            <div class="demo-note">
                Demo mode active. Any username/password accepted. Production auth coming soon.
            </div>
        </form>
    </div>

    <script>
        if (localStorage.getItem('portalUser')) {
            window.location.href = 'portal-hub-professional.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            document.getElementById('usernameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');

            if (!username) {
                document.getElementById('usernameError').textContent = 'Username required';
                document.getElementById('usernameError').classList.add('show');
                return;
            }
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password required';
                document.getElementById('passwordError').classList.add('show');
                return;
            }

            localStorage.setItem('portalUser', username);
            localStorage.setItem('portalRole', 'Field Engineer');
            localStorage.setItem('portalName', username.charAt(0).toUpperCase() + username.slice(1));
            localStorage.setItem('portalLoginTime', new Date().toLocaleString());
            window.location.href = 'portal-hub-professional.html';
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
